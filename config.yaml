# =============================================================================
# Cockpit (Tableau Server) → SharePoint Automation — Template config
# -----------------------------------------------------------------------------
# This file is the SHARED template and is safe to commit.
# Put real credentials and per-machine values in `config.local.yaml`
# (gitignored) — it will be deep-merged on top of this file at runtime.
# See `config.local.yaml.example` for the layout.
# =============================================================================

tableau:
  # Login page / Cockpit base. You must be on the PepsiCo network or VPN.
  site_url: "https://cockpit.mypepsico.com"

  # The view you export from (the URL you shared)
  view_url: "https://cockpit.mypepsico.com/#/views/ValidationPecNewMetrics-FieldLaborEfficiency/Validation?:iid=1"

  # -------------------------------------------------------------------
  # PRIMARY (recommended): a saved Custom View URL.
  # In Cockpit, apply all your filters once, click "Save Custom View",
  # name it (e.g. "Monthly_Export"), then paste the resulting URL into
  # config.local.yaml. If set, the script skips all filter-clicking.
  # -------------------------------------------------------------------
  custom_view_url: ""

  # SSO credentials — leave EMPTY here; set them in config.local.yaml
  email: ""
  password: ""

  # Local download folder — override in config.local.yaml per machine.
  download_dir: "./downloads/cockpit_exports"

  page_load_timeout: 45     # seconds; Cockpit can be slow to render

  # Set to false on the first run to watch the browser and verify selectors;
  # flip to true once the flow is stable (and required for the scheduler).
  headless: false

  # -------------------------------------------------------------------
  # FALLBACK: explicit filters (used only if custom_view_url is empty).
  # Single values pick from a dropdown; lists are multi-select.
  # Filter names must match the dashboard labels EXACTLY.
  # -------------------------------------------------------------------
  filters:
    Year: "All"
    Month: "All"
    Category: "All"
    Level: "Food/Bev/Dairy"
    Sector: ["FLNA", "PBNA", "QNA"]
    Cluster: "All"
    BU: "All"
    MU: "All"
    CO/FO/JV: "All"
    Country: "All"

  # The measure dropdown under the PepsiCo logo (top-right)
  measure: "Amt"

  # Export settings
  export_format: "CSV"      # Crosstab → CSV
  # Final CSV filename. {date} is replaced with YYYY-MM at runtime.
  output_filename: "FieldLaborEfficiency_{date}.csv"


sharepoint:
  # All secret values below should be set in config.local.yaml
  tenant_id: ""
  client_id: ""
  client_secret: ""
  sharepoint_hostname: ""     # e.g. pepsico.sharepoint.com
  site_name: ""
  drive_name: "Documents"
  folder_path: "PowerBI/Cockpit Exports"


scheduler:
  run_day: 1
  run_time: "06:00"
